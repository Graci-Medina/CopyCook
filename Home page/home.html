<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopyCook - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
<!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <img src="logo.png" alt="CopyCook Logo">
            </div>
            <nav class="nav-icons">
                <a href="home.html" class="nav-icon active">
                    <img src="home-icon.png" alt="Home">
                </a>
                <a href="../Explore/explore.html" class="nav-icon">
                    <img src="explore-icon.png" alt="Explore">
                </a>
                <a href="ai-recipe.html" class="nav-icon">
                    <img src="plus-icon.png" alt="Add">
                </a>
                <a href="../Saved page/saved.html" class="nav-icon">
                    <img src="save-icon.png" alt="Saved">
                </a>
                <a href="../Messages page/Messages.html" class="nav-icon">
                    <img src="message.png" alt="Messages">
                    <span class="notification-badge">10</span>
                </a>
            </nav>
            <div class="nav-bottom">
                <a href="#" class="nav-icon" onclick="toggleLogoutPopup(event)">
                    <img src="settings-icon.png" alt="Settings">
                </a>
            </div>
        </aside>
<!-- Main Content -->
        <main class="main-content">
<!-- Search Bar -->
            <div class="search-container">
                <div class="search-bar">
                    <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <circle cx="11" cy="11" r="7" stroke="#5A5A5A" stroke-width="2"/>
                        <path d="M16 16L20 20" stroke="#5A5A5A" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="mainSearchInput" placeholder="Search restaurants or dishes" oninput="searchRecipes(this.value)">
                    <svg class="mic-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <rect x="10" y="5" width="4" height="10" rx="2" fill="#D4A5A5"/>
                        <path d="M7 12C7 14.7614 9.23858 17 12 17C14.7614 17 17 14.7614 17 12" stroke="#D4A5A5" stroke-width="2"/>
                        <line x1="12" y1="17" x2="12" y2="20" stroke="#D4A5A5" stroke-width="2"/>
                        <line x1="9" y1="20" x2="15" y2="20" stroke="#D4A5A5" stroke-width="2"/>
                    </svg>
                </div>
                <div class="profile-pic" id="profileAvatar">
                    <img src="drakepfp.png" alt="Profile">
                </div>
            </div>
<!-- Food Grid — populated by script.js -->
            <div class="food-grid" id="foodGrid"></div>
        </main>
    </div>

<!-- Logout Popup -->
    <div id="logoutPopup" class="logout-popup">
        <div class="logout-content">
            <h3>Account Settings</h3>
            <button class="logout-btn" onclick="handleLogout()">Log Out</button>
            <button class="cancel-btn" onclick="closeLogoutPopup()">Cancel</button>
        </div>
    </div>

<!-- ── Save-to-Folder Modal ── -->
<div class="save-modal-overlay" id="saveModal" onclick="handleSaveOverlayClick(event)">
    <div class="save-modal">
        <div class="save-modal-header">
            <h3>Save to folder</h3>
            <button class="save-modal-close" onclick="closeSaveModal()">&#x2715;</button>
        </div>

        <!-- Existing folders list -->
        <div class="folder-list" id="folderList">
            <p class="no-folders-msg">Loading your folders…</p>
        </div>

        <hr class="save-modal-divider">

        <!-- Create new folder inline -->
        <div class="create-folder-row">
            <input type="text" id="newFolderInput" placeholder="New folder name…" maxlength="40">
            <button onclick="createAndSelect()">+ Create</button>
        </div>
        <!-- Privacy toggle for new folder -->
        <div class="create-privacy-row">
            <button class="create-privacy-btn selected" id="cpBtnPrivate" onclick="setCreatePrivacy('private')"> Private</button>
            <button class="create-privacy-btn" id="cpBtnPublic" onclick="setCreatePrivacy('public')"> Public</button>
        </div>

        <div class="save-modal-actions">
            <button class="btn-modal-cancel" onclick="closeSaveModal()">Cancel</button>
            <button class="btn-modal-save" id="btnSaveToFolder" onclick="confirmSave()" disabled>Save</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

    <script type="module" src="home-firebase.js"></script>
    <script src="script.js"></script>
</body>
</html>
