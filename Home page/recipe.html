<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopyCook - Recipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F5EFE7;
            height: 100vh;
            overflow: hidden;
        }

        .container { display: flex; height: 100vh; }

        /* ── Sidebar ── */
        .sidebar {
            width: 75px;
            background-color: #f5efe7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 2px solid #E8B4B4;
            flex-shrink: 0;
        }
        .logo { margin-bottom: 40px; }
        .logo img { height: 50px; width: auto; cursor: pointer; }
        .nav-icons { display: flex; flex-direction: column; gap: 30px; flex: 1; margin-top: 150px; }
        .nav-icon {
            position: relative;
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .nav-icon:hover { transform: scale(1.1); }
        .nav-icon img { width: 100%; height: 100%; border-radius: 50%; }
        .nav-icon.active { box-shadow: 0 0 0 3px #E8B4B4; }
        .notification-badge {
            position: absolute;
            top: -5px; right: -5px;
            background-color: #D4A5A5;
            color: white;
            font-size: 10px; font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px; text-align: center;
        }
        .nav-bottom { margin-top: auto; padding-bottom: 20px; }

        /* ── Main ── */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Search bar ── */
        .search-container {
            display: flex; align-items: center;
            padding: 20px 30px; gap: 15px; flex-shrink: 0;
        }
        .search-bar {
            flex: 1;
            display: flex; align-items: center;
            background-color: #9FB19F;
            border-radius: 15px;
            padding: 15px 20px; gap: 12px;
        }
        .search-bar input {
            flex: 1; border: none; background: transparent; outline: none;
            font-size: 16px; color: #3A3A3A; font-family: 'Poppins', sans-serif;
            cursor: pointer;
        }
        .search-bar input::placeholder { color: #5A5A5A; }
        .profile-pic {
            width: 50px; height: 50px;
            border-radius: 50%; overflow: hidden;
            border: 3px solid #E8B4B4;
            cursor: pointer; transition: transform 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .profile-pic:hover { transform: scale(1.05); }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }

        /* ── Recipe body ── */
        .recipe-body {
            flex: 1; overflow: hidden;
            padding: 0 30px 30px;
            display: flex; gap: 25px;
        }

        /* ── Left panel ── */
        .left-panel {
            width: 420px; flex-shrink: 0;
            display: flex; flex-direction: column; gap: 16px;
            overflow: hidden;
        }
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            background: none; border: none; cursor: pointer;
            font-family: 'Poppins', sans-serif; font-size: 15px;
            color: #5A5A5A; padding: 0; transition: color 0.2s;
        }
        .back-btn:hover { color: #D4A5A5; }
        .action-row { display: flex; align-items: center; gap: 14px; }
        .action-btn {
            background: none; border: none; cursor: pointer;
            padding: 6px; border-radius: 50%;
            transition: background 0.2s, transform 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .action-btn:hover { background: rgba(212,165,165,0.15); transform: scale(1.1); }
        .save-action-btn {
            margin-left: auto;
            background-color: #9FB19F;
            color: white; border: none;
            padding: 10px 28px; border-radius: 12px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; font-family: 'Poppins', sans-serif;
            transition: background 0.2s, transform 0.2s;
        }
        .save-action-btn:hover { background-color: #8AA08A; transform: scale(1.03); }
        .save-action-btn.saved { background-color: #D4A5A5; }
        .save-action-btn.saved:hover { background-color: #C49595; }
        .recipe-image-wrap {
            border-radius: 20px; overflow: hidden;
            flex: 1; min-height: 420px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        .recipe-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* ── Right panel ── */
        .right-panel {
            flex: 1;
            display: flex; flex-direction: column; gap: 20px;
            min-width: 0; overflow-y: auto; padding-right: 4px;
        }
        .right-panel::-webkit-scrollbar { width: 8px; }
        .right-panel::-webkit-scrollbar-track { background: #F5EFE7; }
        .right-panel::-webkit-scrollbar-thumb { background: #D4A5A5; border-radius: 8px; }
        .right-panel::-webkit-scrollbar-thumb:hover { background: #C49595; }

        .recipe-title { font-size: 32px; font-weight: 700; color: #2A2A2A; line-height: 1.2; }
        .category-tag {
            display: inline-flex; align-items: center; gap: 6px;
            background-color: #E8B4B4; color: #5A3A3A;
            padding: 6px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 500;
        }
        .card {
            background: white; border-radius: 20px;
            padding: 22px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 18px; font-weight: 700; color: #2A2A2A;
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .ingredient-list { display: flex; flex-direction: column; gap: 10px; }
        .ingredient-row { display: flex; align-items: center; gap: 14px; font-size: 14px; }
        .ingredient-dot { width: 14px; height: 14px; border-radius: 50%; background-color: #E8B4B4; flex-shrink: 0; }
        .ingredient-measure { font-weight: 600; color: #3A3A3A; min-width: 80px; }
        .ingredient-name { color: #5A5A5A; }
        .instructions-list { display: flex; flex-direction: column; gap: 10px; }
        .instruction-step {
            background-color: #F8E8E8; border-radius: 10px;
            padding: 12px 16px; font-size: 13.5px; color: #3A3A3A; line-height: 1.6;
        }
        .loading-state {
            display: flex; align-items: center; justify-content: center;
            flex: 1; font-size: 16px; color: #9FB19F;
        }

        /* ── Cost Comparison Card ── */
        .cost-card {
            background: white; border-radius: 20px;
            padding: 22px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .cost-header {
            font-size: 18px; font-weight: 700; color: #2A2A2A;
            margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
        }
        .cost-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
        .cost-box { border-radius: 14px; padding: 16px 18px; display: flex; flex-direction: column; gap: 4px; }
        .cost-box.home { background: #EEF5EE; border: 2px solid #9FB19F; }
        .cost-box.restaurant { background: #FDF0F0; border: 2px solid #E8B4B4; }
        .cost-box-label { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
        .cost-box.home .cost-box-label { color: #6A8A6A; }
        .cost-box.restaurant .cost-box-label { color: #A56A6A; }
        .cost-box-price { font-size: 28px; font-weight: 700; line-height: 1.1; }
        .cost-box.home .cost-box-price { color: #4A7A4A; }
        .cost-box.restaurant .cost-box-price { color: #C45A5A; }
        .cost-box-note { font-size: 11.5px; color: #8A8A8A; }
        .savings-bar-wrap {
            background: #F0FFF0; border: 2px solid #9FB19F;
            border-radius: 14px; padding: 14px 18px;
            display: flex; align-items: center; gap: 14px; margin-bottom: 18px;
        }
        .savings-icon { font-size: 22px; flex-shrink: 0; }
        .savings-text { flex: 1; min-width: 0; }
        .savings-headline { font-size: 15px; font-weight: 700; color: #2A5A2A; }
        .savings-sub { font-size: 12px; color: #5A8A5A; margin-top: 2px; }
        .savings-pill { background: #9FB19F; color: white; font-size: 14px; font-weight: 700; padding: 8px 14px; border-radius: 50px; white-space: nowrap; flex-shrink: 0; }
        .cost-breakdown-title { font-size: 13px; font-weight: 700; color: #5A5A5A; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
        .cost-breakdown-list { display: flex; flex-direction: column; gap: 7px; }
        .cost-ingredient-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .cost-ingredient-name { flex: 1; color: #4A4A4A; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cost-bar-track { width: 90px; height: 6px; background: #F0EDE8; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
        .cost-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #9FB19F, #D4A5A5); }
        .cost-ingredient-price { color: #4A7A4A; font-weight: 700; font-size: 13px; min-width: 38px; text-align: right; }
        .cost-disclaimer { margin-top: 14px; font-size: 11px; color: #AAAAAA; line-height: 1.5; }

        /* ── Logout popup ── */
        .logout-popup {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .logout-popup.active { display: flex; }
        .logout-content {
            background: #FDFBF7; border: 3px solid #E8B4B4;
            border-radius: 20px; padding: 40px 50px; text-align: center;
        }
        .logout-content h3 { color: #3A3A3A; font-size: 24px; margin-bottom: 30px; font-weight: 500; }
        .logout-btn, .cancel-btn {
            width: 100%; padding: 15px 30px; border: none;
            border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; font-family: 'Poppins', sans-serif; margin: 8px 0;
        }
        .logout-btn { background-color: #D4A5A5; color: white; }
        .cancel-btn { background-color: #9FB19F; color: white; }

        /* ── Save-to-folder modal ── */
        .save-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 500;
            align-items: center; justify-content: center;
        }
        .save-modal-overlay.active { display: flex; }
        .save-modal {
            background: #FDFBF7; border: 3px solid #E8B4B4;
            border-radius: 24px; padding: 36px 44px;
            width: 480px; max-width: 92vw;
            animation: modalIn 0.25s ease-out;
        }
        @keyframes modalIn {
            from { transform: translateY(-28px) scale(0.97); opacity: 0; }
            to   { transform: translateY(0) scale(1); opacity: 1; }
        }
        .save-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .save-modal-header h3 { font-size: 21px; font-weight: 700; color: #2A2A2A; }
        .save-modal-close { background: none; border: none; cursor: pointer; color: #9A9A9A; font-size: 20px; line-height: 1; padding: 4px; transition: color 0.2s; }
        .save-modal-close:hover { color: #D4A5A5; }
        .folder-list { display: flex; flex-direction: column; gap: 10px; max-height: 280px; overflow-y: auto; margin-bottom: 20px; padding-right: 4px; }
        .folder-list::-webkit-scrollbar { width: 6px; }
        .folder-list::-webkit-scrollbar-thumb { background: #D4A5A5; border-radius: 6px; }
        .folder-list-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 14px; border: 2px solid #E8E8E0; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-family: 'Poppins', sans-serif; }
        .folder-list-item:hover { border-color: #9FB19F; background: #F0F5F0; }
        .folder-list-item.selected { border-color: #9FB19F; background: #E8F0E8; }
        .folder-list-item.already-saved { border-color: #D4A5A5; background: #FDF0F0; cursor: default; opacity: 0.7; }
        .folder-item-thumb { width: 46px; height: 46px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: #E8E8E0; }
        .folder-item-thumb.placeholder { display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .folder-item-info { flex: 1; min-width: 0; }
        .folder-item-name { font-size: 15px; font-weight: 600; color: #2A2A2A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .folder-item-count { font-size: 12px; color: #9A9A9A; margin-top: 2px; }
        .folder-item-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #D0D0D0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.2s, background 0.2s; }
        .folder-list-item.selected .folder-item-check { background: #9FB19F; border-color: #9FB19F; }
        .folder-list-item.already-saved .folder-item-check { background: #D4A5A5; border-color: #D4A5A5; }
        .folder-item-check svg { display: none; }
        .folder-list-item.selected .folder-item-check svg,
        .folder-list-item.already-saved .folder-item-check svg { display: block; }
        .no-folders-msg { text-align: center; color: #9FB19F; font-size: 14px; padding: 20px 0; }
        .save-modal-divider { border: none; border-top: 2px solid #E8E8E0; margin: 4px 0 16px; }
        .create-folder-row { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        .create-folder-row input { flex: 1; background: #E8E8E0; border: 2px solid transparent; padding: 11px 14px; border-radius: 10px; font-size: 14px; font-family: 'Poppins', sans-serif; color: #3A3A3A; outline: none; transition: border-color 0.2s; }
        .create-folder-row input:focus { border-color: #9FB19F; background: #DDD; }
        .create-folder-row button { background: #9FB19F; color: white; border: none; padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
        .create-folder-row button:hover { background: #8AA08A; }
        .create-privacy-row { display: flex; gap: 8px; margin-top: -10px; margin-bottom: 20px; }
        .create-privacy-btn { flex: 1; padding: 9px; border-radius: 10px; border: 2px solid #E8E8E0; background: white; font-size: 13px; font-weight: 600; font-family: 'Poppins', sans-serif; color: #7A7A7A; cursor: pointer; transition: all 0.18s; }
        .create-privacy-btn:hover { border-color: #9FB19F; color: #9FB19F; }
        .create-privacy-btn.selected { border-color: #9FB19F; background: #9FB19F; color: white; }
        .save-modal-actions { display: flex; gap: 12px; }
        .save-modal-actions button { flex: 1; padding: 13px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.2s; }
        .btn-modal-cancel { background: #E8E8E0; color: #5A5A5A; }
        .btn-modal-cancel:hover { background: #DDD; }
        .btn-modal-save { background: #9FB19F; color: white; }
        .btn-modal-save:hover { background: #8AA08A; }
        .btn-modal-save:disabled { background: #CCC; cursor: not-allowed; }

        /* ── Comment drawer ── */
        .comment-drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 400; }
        .comment-drawer-overlay.active { display: block; }
        .comment-drawer {
            position: fixed; top: 0; right: -480px; height: 100%;
            width: 460px; max-width: 95vw;
            background: #FDFBF7; border-left: 2px solid #E8B4B4;
            display: flex; flex-direction: column;
            transition: right 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 401;
        }
        .comment-drawer.open { right: 0; }
        .drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 26px 16px; border-bottom: 2px solid #F0EDE8; flex-shrink: 0; }
        .drawer-title { font-size: 20px; font-weight: 700; color: #2A2A2A; }
        .drawer-close { background: none; border: none; cursor: pointer; color: #9A9A9A; font-size: 22px; line-height: 1; padding: 4px; transition: color 0.2s; }
        .drawer-close:hover { color: #D4A5A5; }
        .drawer-body { flex: 1; overflow-y: auto; padding: 20px 26px; }
        .drawer-body::-webkit-scrollbar { width: 6px; }
        .drawer-body::-webkit-scrollbar-thumb { background: #D4A5A5; border-radius: 6px; }
        .drawer-footer { padding: 16px 26px 24px; border-top: 2px solid #F0EDE8; flex-shrink: 0; background: #FDFBF7; }
        .drawer-input-row { display: flex; gap: 10px; align-items: flex-start; }
        .drawer-textarea { flex: 1; background: #F5F2EE; border: 2px solid transparent; border-radius: 14px; padding: 11px 14px; font-size: 13.5px; font-family: 'Poppins', sans-serif; color: #3A3A3A; resize: none; outline: none; min-height: 44px; line-height: 1.5; transition: border-color 0.2s, min-height 0.2s; }
        .drawer-textarea:focus { border-color: #9FB19F; background: #EFF5EF; min-height: 72px; }
        .drawer-textarea::placeholder { color: #ABABAB; }
        .drawer-post-btn { background: #9FB19F; color: white; border: none; padding: 11px 18px; border-radius: 12px; font-size: 13px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; align-self: flex-end; transition: background 0.2s; }
        .drawer-post-btn:hover { background: #8AA08A; }
        .drawer-post-btn:disabled { background: #CCC; cursor: not-allowed; }
        .drawer-login-notice { font-size: 13px; color: #9A9A9A; font-style: italic; padding: 10px 0; }

        /* Comment items inside drawer */
        .comment-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: white; background: #9FB19F; }
        .comment-item { display: flex; gap: 12px; margin-bottom: 14px; }
        .comment-body { flex: 1; min-width: 0; }
        .comment-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
        .comment-name { font-size: 13.5px; font-weight: 600; color: #2A2A2A; }
        .comment-time { font-size: 11px; color: #ABABAB; }
        .comment-text { font-size: 13.5px; color: #4A4A4A; line-height: 1.55; word-break: break-word; }
        .comment-delete { background: none; border: none; cursor: pointer; color: #D4A5A5; font-size: 11px; padding: 2px 6px; border-radius: 6px; margin-left: 4px; transition: background 0.15s; display: none; }
        .comment-delete:hover { background: #F8E8E8; }
        .comment-delete.visible { display: inline; }
        .no-comments { text-align: center; color: #ABABAB; font-size: 14px; padding: 20px 0; }
        .comments-loading { text-align: center; color: #9FB19F; font-size: 13px; padding: 16px 0; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #3A3A3A; color: white;
            padding: 12px 24px; border-radius: 30px;
            font-size: 14px; font-weight: 500; font-family: 'Poppins', sans-serif;
            opacity: 0; transition: opacity 0.3s, transform 0.3s;
            z-index: 9999; pointer-events: none; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: #9FB19F; }
        .toast.error   { background: #D4A5A5; }
    </style>
</head>
<body>

<div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <img src="logo.png" alt="CopyCook Logo" onclick="window.location.href='home.html'">
        </div>
        <nav class="nav-icons">
            <a href="home.html" class="nav-icon active">
                <img src="home-icon.png" alt="Home">
            </a>
            <a href="../Explore/explore.html" class="nav-icon">
                <img src="explore-icon.png" alt="Explore">
            </a>
            <a href="#" class="nav-icon">
                <img src="plus-icon.png" alt="Add">
            </a>
            <a href="../Saved page/saved.html" class="nav-icon">
                <img src="save-icon.png" alt="Saved">
            </a>
            <a href="../Messages page/Messages.html" class="nav-icon">
                <img src="message.png" alt="Messages">
                <span class="notification-badge">10</span>
            </a>
        </nav>
        <div class="nav-bottom">
            <a href="#" class="nav-icon" onclick="toggleLogoutPopup(event)">
                <img src="settings-icon.png" alt="Settings">
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="search-container">
            <div class="search-bar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <circle cx="11" cy="11" r="7" stroke="#5A5A5A" stroke-width="2"/>
                    <path d="M16 16L20 20" stroke="#5A5A5A" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input type="text" placeholder="Search restaurants or dishes"
                       onclick="window.location.href='home.html'" readonly style="cursor:pointer;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <rect x="10" y="5" width="4" height="10" rx="2" fill="#D4A5A5"/>
                    <path d="M7 12C7 14.7614 9.23858 17 12 17C14.7614 17 17 14.7614 17 12" stroke="#D4A5A5" stroke-width="2"/>
                    <line x1="12" y1="17" x2="12" y2="20" stroke="#D4A5A5" stroke-width="2"/>
                    <line x1="9" y1="20" x2="15" y2="20" stroke="#D4A5A5" stroke-width="2"/>
                </svg>
            </div>
            <div class="profile-pic" id="profileAvatar">
                <img src="drakepfp.png" alt="Profile">
            </div>
        </div>

        <div class="recipe-body" id="recipeBody">

<div class="save-modal-overlay" id="saveModal">

<div class="comment-drawer-overlay" id="commentDrawerOverlay" onclick="closeCommentDrawer()"></div>
<div class="comment-drawer" id="commentDrawer">
    <div class="drawer-header">
        <span class="drawer-title">💬 Comments <span id="drawerCommentCount" style="font-size:14px;color:#9A9A9A;font-weight:500"></span></span>

    </div>
    <div class="drawer-body" id="drawerBody">
        <div class="comments-loading">Loading comments…</div>
    </div>
    <div class="drawer-footer">
        <div id="drawerInputArea"></div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
// ── Firebase imports ─────────────────────────────────────────────────────────
import { db, auth } from '../firebase-config.js';
import {
    doc, setDoc, updateDoc, getDoc, getDocs, deleteDoc,
    collection, arrayUnion, addDoc,
    query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// ── Firestore helpers ────────────────────────────────────────────────────────
async function getFolders(uid) {
    const snapshot = await getDocs(collection(db, 'users', uid, 'folders'));
    return snapshot.docs.map(d => ({
        id: d.id, name: d.data().name, privacy: d.data().privacy || 'private',
        recipes: d.data().savedRecipes || [], coverImage: d.data().coverImage || null,
        createdAt: d.data().createdAt || ''
    }));
}
async function createFolder(uid, folderName, privacy = 'private') {
    const safe = folderName.replace(/\//g, '_');
    await setDoc(doc(db, 'users', uid, 'folders', safe),
        { name: folderName, privacy, savedRecipes: [], coverImage: null, createdAt: new Date().toISOString() });
}
async function saveRecipeToFolder(uid, folderName, mealObj) {
    const safe = folderName.replace(/\//g, '_');
    const ref  = doc(db, 'users', uid, 'folders', safe);
    const canonical = { idMeal: mealObj.idMeal, strMeal: mealObj.strMeal, strMealThumb: mealObj.strMealThumb };
    await setDoc(ref, { savedRecipes: arrayUnion(canonical) }, { merge: true });
    const snap = await getDoc(ref);
    if (snap.exists() && !snap.data().coverImage) await updateDoc(ref, { coverImage: canonical.strMealThumb });
}
async function addComment(mealId, uid, displayName, avatarColor, text) {
    await addDoc(collection(db, 'recipes', mealId, 'comments'),
        { uid, displayName, avatarColor: avatarColor || '#9FB19F', text: text.trim(), createdAt: serverTimestamp() });
}
async function getComments(mealId) {
    const q = query(collection(db, 'recipes', mealId, 'comments'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({
        id: d.id, uid: d.data().uid, displayName: d.data().displayName,
        avatarColor: d.data().avatarColor || '#9FB19F', text: d.data().text,
        createdAt: d.data().createdAt?.toDate?.() || new Date()
    }));
}
async function deleteComment(mealId, commentId) {
    await deleteDoc(doc(db, 'recipes', mealId, 'comments', commentId));
}

// ── User state ───────────────────────────────────────────────────────────────
const uid         = localStorage.getItem('userUID');
const displayName = localStorage.getItem('userDisplayName') || 'You';
const avatarColor = localStorage.getItem('userAvatarColor') || '#9FB19F';
const userInitial = localStorage.getItem('userInitial') || displayName[0]?.toUpperCase() || '?';

// ── Avatar ───────────────────────────────────────────────────────────────────
(function loadAvatar() {
    const el = document.getElementById('profileAvatar');
    if (!el) return;
    const initial = localStorage.getItem('userInitial');
    const color   = localStorage.getItem('userAvatarColor');
    const name    = localStorage.getItem('userDisplayName');
    if (initial && color) {
        el.innerHTML = initial;
        el.style.cssText = `background:${color};display:flex;align-items:center;justify-content:center;color:white;font-size:20px;font-weight:700;`;
        el.title = name || '';
    }
})();

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}
window.showToast = showToast;

// ── Logout ───────────────────────────────────────────────────────────────────
window.toggleLogoutPopup = (e) => { e.preventDefault(); document.getElementById('logoutPopup').classList.toggle('active'); };
window.closeLogoutPopup  = ()  => { document.getElementById('logoutPopup').classList.remove('active'); };
window.handleLogout      = ()  => { localStorage.clear(); sessionStorage.clear(); window.location.href = '../login.html'; };
document.getElementById('logoutPopup').addEventListener('click', e => { if (e.target === e.currentTarget) closeLogoutPopup(); });

// ── App state ─────────────────────────────────────────────────────────────────
let currentMeal      = null;
let userFolders      = [];
let selectedFolderId = null;
let createPrivacy    = 'private';
let currentMealId    = null;

// ══════════════════════════════════════════════════════════════════════════════
// COMMENTS DRAWER
// ══════════════════════════════════════════════════════════════════════════════
function timeAgo(date) {
    const secs = Math.floor((Date.now() - date.getTime()) / 1000);
    if (secs < 60)    return 'just now';
    if (secs < 3600)  return `${Math.floor(secs / 60)}m ago`;
    if (secs < 86400) return `${Math.floor(secs / 3600)}h ago`;
    return `${Math.floor(secs / 86400)}d ago`;
}

function makeAvatarEl(name, color) {
    const el = document.createElement('div');
    el.className = 'comment-avatar';
    el.style.background = color || '#9FB19F';
    el.textContent = name?.[0]?.toUpperCase() || '?';
    return el;
}

function renderCommentItem(c) {
    const wrap = document.createElement('div');
    wrap.className = 'comment-item';
    wrap.dataset.id = c.id;

    const av   = makeAvatarEl(c.displayName, c.avatarColor);
    const body = document.createElement('div');
    body.className = 'comment-body';

    const meta = document.createElement('div');
    meta.className = 'comment-meta';
    meta.innerHTML = `<span class="comment-name">${c.displayName}</span>
                      <span class="comment-time">${timeAgo(c.createdAt)}</span>`;

    if (uid && uid === c.uid) {
        const del = document.createElement('button');
        del.className = 'comment-delete visible';
        del.textContent = 'Delete';
        del.onclick = () => handleDeleteComment(c.id, wrap);
        meta.appendChild(del);
    }

    const text = document.createElement('div');
    text.className = 'comment-text';
    text.textContent = c.text;

    body.appendChild(meta);
    body.appendChild(text);
    wrap.appendChild(av);
    wrap.appendChild(body);
    return wrap;
}

async function handleDeleteComment(commentId, el) {
    if (!uid || !currentMealId) return;
    try {
        await deleteComment(currentMealId, commentId);
        el.remove();
        updateCommentCount(-1);
        showToast('Comment deleted.', 'success');
    } catch (err) {
        console.error(err);
        showToast('Could not delete comment.', 'error');
    }
}

function updateCommentCount(delta) {
    const badge = document.getElementById('drawerCommentCount');
    if (!badge) return;
    const cur = parseInt(badge.dataset.count || '0') + delta;
    badge.dataset.count = cur;
    badge.textContent = cur > 0 ? `(${cur})` : '';
}

async function loadComments() {
    const body = document.getElementById('drawerBody');
    body.innerHTML = '<div class="comments-loading">Loading comments…</div>';
    try {
        const comments = await getComments(currentMealId);
        body.innerHTML = '';
        const badge = document.getElementById('drawerCommentCount');
        if (badge) { badge.dataset.count = comments.length; badge.textContent = comments.length > 0 ? `(${comments.length})` : ''; }
        if (comments.length === 0) {
            body.innerHTML = '<div class="no-comments">No comments yet. Be the first!</div>';
        } else {
            comments.forEach(c => body.appendChild(renderCommentItem(c)));
        }
    } catch (err) {
        console.error(err);
        body.innerHTML = '<div class="no-comments" style="color:#D4A5A5">Could not load comments.</div>';
    }
}

function buildDrawerInput() {
    const area = document.getElementById('drawerInputArea');
    if (!uid) {
        area.innerHTML = '<div class="drawer-login-notice">Log in to leave a comment.</div>';
        return;
    }
    area.innerHTML = `
        <div class="drawer-input-row">
            <div class="comment-avatar" style="background:${avatarColor}">${userInitial}</div>
            <textarea class="drawer-textarea" id="drawerTextarea" placeholder="Write a comment…" rows="1"></textarea>
            <button class="drawer-post-btn" id="drawerPostBtn" disabled>Post</button>
        </div>`;

    const textarea = document.getElementById('drawerTextarea');
    const postBtn  = document.getElementById('drawerPostBtn');

    textarea.addEventListener('input', () => { postBtn.disabled = textarea.value.trim().length === 0; });
    textarea.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!postBtn.disabled) postBtn.click(); }
    });
    postBtn.addEventListener('click', async () => {
        const text = textarea.value.trim();
        if (!text) return;
        postBtn.disabled = true;
        postBtn.textContent = '…';
        try {
            await addComment(currentMealId, uid, displayName, avatarColor, text);
            textarea.value = '';
            postBtn.textContent = 'Post';
            const body = document.getElementById('drawerBody');
            const noMsg = body.querySelector('.no-comments');
            if (noMsg) noMsg.remove();
            const fakeComment = { id: '_' + Date.now(), uid, displayName, avatarColor, text, createdAt: new Date() };
            body.insertBefore(renderCommentItem(fakeComment), body.firstChild);
            updateCommentCount(1);
            showToast('Comment posted ✓', 'success');
        } catch (err) {
            console.error(err);
            showToast('Could not post comment.', 'error');
            postBtn.textContent = 'Post';
        }
    });
}

window.openCommentDrawer = function() {
    document.getElementById('commentDrawerOverlay').classList.add('active');
    document.getElementById('commentDrawer').classList.add('open');
    buildDrawerInput();
    loadComments();
};
window.closeCommentDrawer = function() {
    document.getElementById('commentDrawerOverlay').classList.remove('active');
    document.getElementById('commentDrawer').classList.remove('open');
};

// ══════════════════════════════════════════════════════════════════════════════
// SAVE MODAL
// ══════════════════════════════════════════════════════════════════════════════
window.setCreatePrivacy = function(p) {
    createPrivacy = p;
    document.getElementById('cpBtnPrivate').className = 'create-privacy-btn' + (p === 'private' ? ' selected' : '');
    document.getElementById('cpBtnPublic').className  = 'create-privacy-btn' + (p === 'public'  ? ' selected' : '');
};

window.openSaveModal = async function() {
    if (!uid) { showToast('Please log in to save recipes.', 'error'); return; }
    selectedFolderId = null;
    document.getElementById('newFolderInput').value = '';
    document.getElementById('btnSaveToFolder').disabled = true;
    document.getElementById('saveModal').classList.add('active');
    window.setCreatePrivacy('private');
    const listEl = document.getElementById('folderList');
    listEl.innerHTML = '<p class="no-folders-msg">Loading…</p>';
    try {
        userFolders = await getFolders(uid);
        renderFolderList();
    } catch {
        listEl.innerHTML = '<p class="no-folders-msg" style="color:#D4A5A5;">Could not load folders.</p>';
    }
};
window.closeSaveModal = function() { document.getElementById('saveModal').classList.remove('active'); };
document.getElementById('saveModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSaveModal(); });

function renderFolderList() {
    const listEl = document.getElementById('folderList');
    listEl.innerHTML = '';
    if (userFolders.length === 0) {
        listEl.innerHTML = '<p class="no-folders-msg">No folders yet — create one below!</p>';
        return;
    }
    userFolders.forEach(folder => {
        const alreadySaved = currentMeal && (folder.recipes || []).some(r => r.idMeal === currentMeal.idMeal);
        const item = document.createElement('div');
        item.className = 'folder-list-item' + (alreadySaved ? ' already-saved' : '');
        item.dataset.folderId = folder.id;
        const thumbHtml = folder.coverImage
            ? `<img class="folder-item-thumb" src="${folder.coverImage}" alt="${folder.name}" loading="lazy">`
            : `<div class="folder-item-thumb placeholder">📁</div>`;
        const count = (folder.recipes || []).length;
        const subtitle = alreadySaved ? 'Already saved' : `${count} recipe${count !== 1 ? 's' : ''}`;
        item.innerHTML = `${thumbHtml}
            <div class="folder-item-info">
                <div class="folder-item-name">${folder.name}</div>
                <div class="folder-item-count">${subtitle}</div>
            </div>
            <div class="folder-item-check">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                    <path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>`;
        if (!alreadySaved) item.addEventListener('click', () => selectFolder(folder.id, item));
        listEl.appendChild(item);
    });
}

function selectFolder(folderId, itemEl) {
    document.querySelectorAll('.folder-list-item.selected').forEach(el => el.classList.remove('selected'));
    if (selectedFolderId === folderId) {
        selectedFolderId = null;
        document.getElementById('btnSaveToFolder').disabled = true;
    } else {
        selectedFolderId = folderId;
        itemEl.classList.add('selected');
        document.getElementById('btnSaveToFolder').disabled = false;
    }
}

window.createAndSelect = async function() {
    const nameInput = document.getElementById('newFolderInput');
    const name = nameInput.value.trim();
    if (!name) { nameInput.style.borderColor = '#D4A5A5'; setTimeout(() => nameInput.style.borderColor = 'transparent', 1500); return; }
    if (!uid) return;
    try {
        await createFolder(uid, name, createPrivacy);
        const newFolder = { id: name.replace(/\//g, '_'), name, privacy: createPrivacy, recipes: [], coverImage: null };
        userFolders.push(newFolder);
        nameInput.value = '';
        renderFolderList();
        const newItem = document.querySelector(`[data-folder-id="${newFolder.id}"]`);
        if (newItem) selectFolder(newFolder.id, newItem);
    } catch { showToast('Could not create folder.', 'error'); }
};
document.getElementById('newFolderInput').addEventListener('keydown', e => { if (e.key === 'Enter') window.createAndSelect(); });

window.confirmSave = async function() {
    if (!selectedFolderId || !currentMeal) return;
    if (!uid) { showToast('Please log in first.', 'error'); return; }
    const saveBtn = document.getElementById('btnSaveToFolder');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    const folder = userFolders.find(f => f.id === selectedFolderId);
    try {
        await saveRecipeToFolder(uid, folder.name, currentMeal);
        folder.recipes = folder.recipes || [];
        folder.recipes.push(currentMeal);
        closeSaveModal();
        showToast(`Saved to "${folder.name}" ✓`, 'success');
        const btn = document.querySelector('.save-action-btn');
        if (btn) { btn.textContent = 'Saved ✓'; btn.classList.add('saved'); }
    } catch { showToast('Could not save. Try again.', 'error'); }
    finally { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
};

// ══════════════════════════════════════════════════════════════════════════════

        <div class="left-panel">
            <button class="back-btn" onclick="history.back()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M15 18L9 12L15 6" stroke="#5A5A5A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Back

            <div class="action-row">
                <button class="action-btn" id="likeBtn" title="Like" onclick="toggleLike(this)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                            stroke="#D4A5A5" stroke-width="2" fill="none" id="likePathEl"/>

                    </svg>

                <button class="action-btn" title="Share" onclick="shareRecipe()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" stroke="#A5B4D4" stroke-width="2" fill="none"/>
                        <polyline points="16 6 12 2 8 6" stroke="#A5B4D4" stroke-width="2" fill="none"/>

            <div class="card">
                <div class="card-title">👨‍🍳 Instructions</div>
                <div class="instructions-list">${stepRows}</div>
            </div>
            <div class="cost-card" id="costCard">

            </div>
        </div>
    `;
}

// ══════════════════════════════════════════════════════════════════════════════
// LIKE / SHARE
// ══════════════════════════════════════════════════════════════════════════════
window.toggleLike = function(btn) {
    const path = btn.querySelector('#likePathEl');
    const liked = path.getAttribute('fill') === '#D4A5A5';
    path.setAttribute('fill', liked ? 'none' : '#D4A5A5');
};
window.shareRecipe = function() {
    if (navigator.share) {
        navigator.share({ title: currentMeal?.strMeal || 'Recipe', url: window.location.href });
    } else {
        navigator.clipboard.writeText(window.location.href).then(() => showToast('Link copied ✓', 'success'));
    }
};

function parseQuantity(measureStr) {
    if (!measureStr) return { qty: 1, unit: 'piece' };
    const s = measureStr.toLowerCase().trim();
    const numMatch = s.match(/^([\d]+\s+[\d]+\/[\d]+|[\d]+\/[\d]+|[\d]*\.?[\d]+)/);
    let qty = 1;
    if (numMatch) {
        const raw = numMatch[0].trim();
        if (raw.includes('/')) {
            const parts = raw.split(/\s+/);
            if (parts.length === 2) {
                const [n, d] = parts[1].split('/').map(Number);
                qty = parseFloat(parts[0]) + n / d;
            } else {
                const [n, d] = raw.split('/').map(Number);
                qty = n / d;
            }
        } else { qty = parseFloat(raw) || 1; }
    }
    if (/\bkg\b/.test(s))                          return { qty: qty * 35.274, unit: 'oz' };
    if (/\bgrams?\b|\bg\b(?!a)/.test(s))           return { qty: qty * 0.03527, unit: 'oz' };
    if (/\blbs?\b|\bpounds?\b/.test(s))            return { qty: qty * 16, unit: 'oz' };
    if (/\boz\b|\bounces?\b/.test(s))              return { qty, unit: 'oz' };
    if (/\bliters?\b|\blitres?\b|\bml\b/.test(s))  return { qty: /\bml\b/.test(s) ? qty : qty * 1000, unit: 'ml' };
    if (/\bcups?\b/.test(s))                       return { qty: qty * 16, unit: 'tbsp' };
    if (/\btablespoons?\b|\btbsp\b/.test(s))       return { qty, unit: 'tbsp' };
    if (/\bteaspoons?\b|\btsp\b/.test(s))          return { qty, unit: 'tsp' };
    if (/\bcans?\b|\btins?\b/.test(s))             return { qty, unit: 'can' };
    if (/\bcloves?\b/.test(s))                     return { qty, unit: 'clove' };
    if (/\bslices?\b|\bpieces?\b/.test(s))         return { qty, unit: 'piece' };
    return { qty: qty || 1, unit: 'piece' };
}

function findIngredientPrice(ingName) {
    const name = ingName.toLowerCase();
    for (const entry of PRICE_TABLE) {
        if (entry.keys.some(k => name.includes(k))) return entry;
    }
    return { price: 0.12, per: 'oz' };
}

function estimateIngredientCost(ingName, measureStr) {
    const entry = findIngredientPrice(ingName);
    const { qty, unit } = parseQuantity(measureStr);
    let cost;
    if (unit === entry.per) {
        cost = qty * entry.price;
    } else if (entry.per === 'oz') {
        const m = { ml: 1/29.574, tbsp: 0.5, tsp: 0.167, can: 13.5, piece: 3, clove: 0.1 };
        cost = qty * (m[unit] ?? 1) * entry.price;
    } else if (entry.per === 'tbsp') {
        const m = { tsp: 1/3, oz: 2, ml: 1/14.787, piece: 3, can: 32, clove: 0.5 };
        cost = qty * (m[unit] ?? 1) * entry.price;
    } else if (entry.per === 'tsp') {
        const m = { tbsp: 3, oz: 6, ml: 1/4.929, piece: 3, can: 96, clove: 0.5 };
        cost = qty * (m[unit] ?? 1) * entry.price;
    } else if (entry.per === 'ml') {
        const m = { oz: 29.574, tbsp: 14.787, tsp: 4.929, cup: 236.6, can: 400, piece: 60 };
        cost = qty * (m[unit] ?? 1) * entry.price;
    } else if (entry.per === 'piece') {
        const m = { oz: 1/6, ml: 1/120, tbsp: 1/16, tsp: 1/48 };
        cost = qty * (m[unit] ?? 1) * entry.price;
    } else if (entry.per === 'clove') {
        const m = { piece: 8, oz: 5, tsp: 2 };
        cost = qty * (m[unit] ?? 1) * entry.price;
    } else {
        cost = qty * entry.price;
    }
    return Math.min(9.00, Math.max(0.01, cost));
}

function estimateRestaurantPrice(dishName) {
    const name = dishName.toLowerCase();
    for (const entry of RESTAURANT_PRICES) {
        if (entry.keys.some(k => name.includes(k))) {
            return parseFloat((entry.price * (1 + Math.random() * 0.20 - 0.10)).toFixed(2));
        }
    }
    return parseFloat((15 + Math.random() * 6).toFixed(2));
}

function estimateServings(ingredients) {
    for (const { ing, measure } of ingredients) {
        const lower = ing.toLowerCase();
        if (['chicken','beef','pork','lamb','fish','salmon','shrimp'].some(p => lower.includes(p))) {
            const { qty, unit } = parseQuantity(measure);
            const ozQty = unit === 'oz' ? qty : unit === 'ml' ? qty / 29.574 : unit === 'piece' ? qty * 6 : qty;
            return Math.max(2, Math.min(8, Math.round(ozQty / 6)));
        }
    }
    return 4;
}

function computeCostData(dishName, ingredients) {
    const priced = ingredients.map(({ ing, measure }) => ({
        name: ing, cost: parseFloat(estimateIngredientCost(ing, measure).toFixed(2))
    }));
    const homeCost = parseFloat(priced.reduce((s, i) => s + i.cost, 0).toFixed(2));
    const servings = estimateServings(ingredients);
    const perPlate = estimateRestaurantPrice(dishName);
    const restaurantCost = parseFloat((perPlate * servings).toFixed(2));
    const adjustedHomeCost = homeCost > restaurantCost * 0.80
        ? parseFloat((restaurantCost * (0.55 + Math.random() * 0.15)).toFixed(2))
        : homeCost;
    return { homeCost: adjustedHomeCost, restaurantCost, servings, perPlate, ingredients: priced };
}

function renderCostCard(costData) {
    const card = document.getElementById('costCard');
    if (!card) return;
    const { homeCost, restaurantCost, servings, perPlate, ingredients } = costData;
    const savings    = Math.max(0, restaurantCost - homeCost);
    const savingsPct = Math.round((savings / restaurantCost) * 100);
    const homePerServing = (homeCost / (servings || 1)).toFixed(2);
    const maxCost = Math.max(...ingredients.map(i => i.cost), 0.01);
    const ingredientRows = ingredients.map(({ name, cost }) => {
        const barPct = Math.min(100, Math.round((cost / maxCost) * 100));
        return `<div class="cost-ingredient-row">
            <span class="cost-ingredient-name">${name}</span>
            <div class="cost-bar-track"><div class="cost-bar-fill" style="width:${barPct}%"></div></div>
            <span class="cost-ingredient-price">$${cost.toFixed(2)}</span>
        </div>`;
    }).join('');
    card.innerHTML = `
        <div class="cost-header">💰 Cost Comparison</div>
        <div class="cost-columns">
            <div class="cost-box home">
                <span class="cost-box-label">🏠 Cook at Home</span>
                <span class="cost-box-price">$${homeCost.toFixed(2)}</span>
                <span class="cost-box-note">~$${homePerServing}/serving · ${servings} serving${servings !== 1 ? 's' : ''}</span>
            </div>
            <div class="cost-box restaurant">
                <span class="cost-box-label">🍽️ Dine Out</span>
                <span class="cost-box-price">$${restaurantCost.toFixed(2)}</span>
                <span class="cost-box-note">~$${perPlate}/plate × ${servings} people</span>
            </div>
        </div>
        <div class="savings-bar-wrap">
            <div class="savings-text">
                <div class="savings-headline">You save $${savings.toFixed(2)} by cooking at home</div>
                <div class="savings-sub">That's ${savingsPct}% less than dining out for ${servings} people</div>
            </div>
            <div class="savings-pill">-${savingsPct}%</div>
        </div>
        <div class="cost-breakdown-title">Ingredient Cost Breakdown</div>
        <div class="cost-breakdown-list">${ingredientRows}</div>
        <p class="cost-disclaimer">* Estimates based on average U.S. grocery &amp; restaurant prices (2025). Home cost reflects the portion used per recipe. Restaurant cost reflects average casual chain pricing per plate. Prices vary by region and store.</p>
    `;
}

function loadCostEstimate(dishName, ingredients) {
    try {
        renderCostCard(computeCostData(dishName, ingredients));
    } catch (err) {
        const card = document.getElementById('costCard');
        if (card) card.innerHTML = `<div class="cost-header">💰 Cost Comparison</div>
            <p style="color:#AAAAAA;font-size:13px;padding:4px 0;">Cost estimate unavailable for this recipe.</p>`;
        console.error('Cost estimate error:', err);
    }
}

async function renderMealDB(meal) {
    currentMeal   = { idMeal: meal.idMeal, strMeal: meal.strMeal, strMealThumb: meal.strMealThumb };
    currentMealId = meal.idMeal;

    const ingredients = [];
    for (let i = 1; i <= 20; i++) {
        const ing     = meal[`strIngredient${i}`];
        const measure = meal[`strMeasure${i}`];
        if (ing && ing.trim()) ingredients.push({ ing: ing.trim(), measure: (measure || '').trim() });
    }

    const steps = (meal.strInstructions || '').split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 10);
    const ingredientRows = ingredients.map(({ ing, measure }) => `
        <div class="ingredient-row">
            <span class="ingredient-dot"></span>
            <span class="ingredient-measure">${measure || 'To taste'}</span>
            <span class="ingredient-name">${ing}</span>
        </div>`).join('');
    const stepRows = steps.map(s => `<div class="instruction-step">${s}</div>`).join('');
    const tag = [meal.strArea, meal.strCategory].filter(Boolean).join(' · ');

    document.getElementById('recipeBody').innerHTML = buildLayout({
        title: meal.strMeal, image: meal.strMealThumb, tag, ingredientRows, stepRows
    });

    // ── Check if already saved and update button state on load ──
    if (uid) {
        try {
            const folders = await getFolders(uid);
            const alreadySaved = folders.some(f =>
                (f.recipes || []).some(r => r.idMeal === meal.idMeal)
            );
            if (alreadySaved) {
                const btn = document.querySelector('.save-action-btn');
                if (btn) {
                    btn.textContent = 'Saved ✓';
                    btn.classList.add('saved');
                }
            }
        } catch (err) {
            console.warn('Could not check saved state:', err);
        }
    }

    loadCostEstimate(meal.strMeal, ingredients);
}

// ── Load recipe ───────────────────────────────────────────────────────────────
async function loadRecipe() {
    const params = new URLSearchParams(window.location.search);
    const mealId = params.get('id');
    const body   = document.getElementById('recipeBody');

    if (!mealId) {
        body.innerHTML = `
            <div class="loading-state" style="flex-direction:column;gap:16px;">
                <span>No recipe selected.</span>
                <button onclick="history.back()" style="background:#9FB19F;color:white;border:none;padding:10px 24px;border-radius:12px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;cursor:pointer;">
                    ← Go Back
                </button>
            </div>`;
        return;
    }

    try {
        const res  = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${mealId}`);
        const data = await res.json();
        if (data.meals?.[0]) {
            await renderMealDB(data.meals[0]);
        } else {
            body.innerHTML = '<div class="loading-state">Recipe not found.</div>';
        }
    } catch (err) {
        console.error('loadRecipe error:', err);
        body.innerHTML = '<div class="loading-state">Failed to load recipe. Check your connection.</div>';
    }
}

document.addEventListener('DOMContentLoaded', loadRecipe);
